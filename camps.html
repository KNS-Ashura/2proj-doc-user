<body data-page="camps" class="antialiased">
  <template id="doc">
    <p class="text-xs font-medium uppercase tracking-wider text-cyan-300">Le jeu</p>
    <h1>Camps & Ports</h1>
    <p>Les <strong>camps</strong> et les <strong>ports</strong> sont les sites capturables de la carte. Ils produisent vos unités, génèrent de l'or et constituent les objectifs de la conquête. Chaque carte compte <strong>13 camps</strong> et <strong>7 ports</strong>, soit 20 sites.</p>

    <div class="mt-2 grid gap-4 sm:grid-cols-2">
      <div class="pq-card p-5">
        <h3 class="!mt-0 pq-h3-icon"><i data-lucide="castle"></i> Camp terrestre</h3>
        <p class="!mt-1 text-sm">Produit les 7 unités terrestres. Défendu par un Gardien terrestre.</p>
      </div>
      <div class="pq-card p-5">
        <h3 class="!mt-0 pq-h3-icon"><i data-lucide="anchor"></i> Port</h3>
        <p class="!mt-1 text-sm">Produit les 3 unités maritimes. Défendu par un Gardien de port. Permet de traverser l'eau.</p>
      </div>
    </div>

    <h2>Capturer un site</h2>
    <p>Chaque camp ou port est défendu par un <strong>Gardien</strong> qui apparaît automatiquement. Pour vous emparer du site :</p>
    <ol>
      <li>Envoyez votre armée attaquer le site (clic droit sur le gardien / bâtiment).</li>
      <li>Vainquez le <strong>Gardien</strong> : le site change alors de propriétaire et passe dans votre camp.</li>
      <li>À la capture, la file de production est vidée et un nouveau gardien à votre couleur apparaît.</li>
    </ol>
    <p>Le gardien défend dans un rayon de <strong>260 px</strong> et poursuit jusqu'à <strong>320 px</strong> autour de son site. Les gardiens de port tirent aussi à distance sur les ennemis proches.</p>

    <h2>Produire des unités</h2>
    <p>Sélectionnez un de vos sites (clic gauche) pour ouvrir son panneau de production, puis cliquez sur l'unité voulue. Le coût en or est prélevé immédiatement, puis l'unité est mise en file d'attente.</p>

    <h3>Catalogue d'un camp (7 unités)</h3>
    <table>
      <thead><tr><th>Touche</th><th>Unité</th><th>Prix (Niv. I)</th></tr></thead>
      <tbody>
        <tr><td><kbd>1</kbd></td><td>Infanterie</td><td>50 or</td></tr>
        <tr><td><kbd>2</kbd></td><td>Archer</td><td>80 or</td></tr>
        <tr><td><kbd>3</kbd></td><td>Lourd</td><td>150 or</td></tr>
        <tr><td><kbd>4</kbd></td><td>Soutien</td><td>100 or</td></tr>
        <tr><td><kbd>5</kbd></td><td>Soigneur</td><td>100 or</td></tr>
        <tr><td><kbd>6</kbd></td><td>Anti-armure</td><td>90 or</td></tr>
        <tr><td><kbd>7</kbd></td><td>Mortier</td><td>200 or</td></tr>
      </tbody>
    </table>

    <h3>Catalogue d'un port (3 unités)</h3>
    <table>
      <thead><tr><th>Touche</th><th>Unité</th><th>Prix (Niv. I)</th></tr></thead>
      <tbody>
        <tr><td><kbd>8</kbd></td><td>Transport maritime</td><td>180 or</td></tr>
        <tr><td><kbd>9</kbd></td><td>Char maritime</td><td>160 or</td></tr>
        <tr><td><kbd>0</kbd></td><td>Archer maritime</td><td>90 or</td></tr>
      </tbody>
    </table>

    <h2>Revenus</h2>
    <p>Chaque site possédé rapporte de l'or <strong>chaque seconde</strong> : 2 or au niveau 1, 3 au niveau 2, 5 au niveau 3. Contrôler une <a href="regions.html">région entière</a> ajoute un bonus de +2 or/s par site de la région.</p>

    <h2>Améliorer un site</h2>
    <p>Le bouton <strong>Améliorer</strong> fait passer un camp ou un port au niveau supérieur (jusqu'au niveau 3) : plus de PV, plus de revenus, production plus rapide et unités d'un palier supérieur. Détails et coûts sur la page <a href="levels.html">Système de niveaux</a>.</p>
  </template>
