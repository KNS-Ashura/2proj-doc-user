<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Power Quest — Documentation joueur</title>
  <meta name="description" content="Documentation officielle du jeu de stratégie temps réel Power Quest : commandes, unités, camps, régions, niveaux, cartes et mode en ligne." />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body data-page="index" class="antialiased">
  <template id="doc">

    <!-- HERO -->
    <section class="pq-hero">
      <div class="pq-hero-bg pixel" aria-hidden="true">
        <img src="assets/bg/menu.png" alt="" />
      </div>
      <div class="pq-hero-overlay" aria-hidden="true"></div>
      <div class="pq-hero-body">
        <span class="pq-chip">
          <span class="inline-block h-2 w-2 bg-[var(--bookmark)]"></span>
          RTS · Solo · En ligne
        </span>
        <h1 class="mt-4 font-display font-bold leading-tight">Power Quest</h1>
        <p class="pq-hero-lead mt-3 leading-relaxed">
          Conquérez la carte, produisez vos armées et écrasez l'adversaire — contre l'IA ou en ligne.
        </p>
        <div class="mt-6 flex flex-wrap gap-3">
          <a href="commands.html" class="pq-btn pq-btn-primary">Voir les commandes</a>
          <a href="units.html" class="pq-btn">Découvrir les unités</a>
        </div>
      </div>
    </section>

    <!-- ROSTER -->
    <section class="mt-10 pq-section-center">
      <h2>Le roster en un coup d'œil</h2>
      <p>11 unités — cliquez sur une icône pour voir ses statistiques.</p>
      <div id="home-roster" class="pq-roster"></div>
    </section>

    <!-- SECTIONS -->
    <section class="mt-10 pq-section-center">
      <h2>Explorer la documentation</h2>
      <div class="pq-explorer-grid mt-2 grid gap-4 sm:grid-cols-2">
        <a href="commands.html" class="pq-card pq-card-h block" data-reveal>
          <h3 class="!mt-0 pq-h3-icon"><i data-lucide="keyboard"></i> Commandes</h3>
          <p class="!mt-1">Clavier, souris, sélection et ordres.</p>
        </a>
        <a href="units.html" class="pq-card pq-card-h block" data-reveal>
          <h3 class="!mt-0 pq-h3-icon"><i data-lucide="swords"></i> Unités</h3>
          <p class="!mt-1">Stats, niveaux et compétences.</p>
        </a>
        <a href="camps.html" class="pq-card pq-card-h block" data-reveal>
          <h3 class="!mt-0 pq-h3-icon"><i data-lucide="castle"></i> Camps & Ports</h3>
          <p class="!mt-1">Production et capture de sites.</p>
        </a>
        <a href="levels.html" class="pq-card pq-card-h block" data-reveal>
          <h3 class="!mt-0 pq-h3-icon"><i data-lucide="arrow-up"></i> Système de niveaux</h3>
          <p class="!mt-1">Améliorations et revenus.</p>
        </a>
        <a href="regions.html" class="pq-card pq-card-h block" data-reveal>
          <h3 class="!mt-0 pq-h3-icon"><i data-lucide="map"></i> Système de régions</h3>
          <p class="!mt-1">Bonus d'or par région.</p>
        </a>
        <a href="maps.html" class="pq-card pq-card-h block" data-reveal>
          <h3 class="!mt-0 pq-h3-icon"><i data-lucide="globe"></i> Cartes</h3>
          <p class="!mt-1">Les 3 cartes et l'IA.</p>
        </a>
        <a href="online.html" class="pq-card pq-card-h block" data-reveal>
          <h3 class="!mt-0 pq-h3-icon"><i data-lucide="wifi"></i> Jeu en ligne</h3>
          <p class="!mt-1">Compte et multijoueur.</p>
        </a>
      </div>
    </section>

    <!-- CARTES -->
    <section class="mt-10 pq-section-center">
      <h2>Les trois cartes</h2>
      <p>Aperçu des mondes — cliquez pour les détails et l'IA.</p>
      <div class="pq-maps-strip">
        <a href="maps.html">
          <span class="pq-map-thumb"><img src="assets/maps/map1.png" alt="Carte 1" class="pixel" /></span>
          <span class="pq-map-label">Carte I</span>
        </a>
        <a href="maps.html">
          <span class="pq-map-thumb"><img src="assets/maps/map2.png" alt="Carte 2" class="pixel" /></span>
          <span class="pq-map-label">Carte II</span>
        </a>
        <a href="maps.html">
          <span class="pq-map-thumb"><img src="assets/maps/map3.png" alt="Carte 3" class="pixel" /></span>
          <span class="pq-map-label">Carte III</span>
        </a>
      </div>
    </section>

    <!-- GAME LOOP -->
    <section class="mt-10">
      <h2>La boucle de jeu</h2>
      <ul class="pq-game-loop">
        <li><img class="pq-loop-icon pixel" src="assets/units/guardian.png" alt="" width="40" height="40" /><span><strong>Démarrez avec un camp</strong> et 100 or. Chaque site possédé rapporte de l'or chaque seconde.</span></li>
        <li><img class="pq-loop-icon pixel" src="assets/units/infantry.png" alt="" width="40" height="40" /><span><strong>Produisez des unités</strong> depuis vos camps (terrestres) et ports (maritimes).</span></li>
        <li><img class="pq-loop-icon pixel" src="assets/units/archer.png" alt="" width="40" height="40" /><span><strong>Capturez les sites voisins</strong> en vainquant leur gardien avec votre armée.</span></li>
        <li><img class="pq-loop-icon pixel" src="assets/units/heavy.png" alt="" width="40" height="40" /><span><strong>Améliorez vos camps</strong> (niveaux 1 → 3) pour des unités plus fortes et plus de revenus.</span></li>
        <li><img class="pq-loop-icon pixel" src="assets/units/support.png" alt="" width="40" height="40" /><span><strong>Contrôlez des régions entières</strong> pour empocher de gros bonus d'or.</span></li>
        <li><img class="pq-loop-icon pixel" src="assets/units/anti_armor.png" alt="" width="40" height="40" /><span><strong>Détruisez l'adversaire</strong> en lui prenant tous ses sites.</span></li>
      </ul>
    </section>

  </template>

  <script src="assets/data.js"></script>
  <script src="assets/site.js"></script>
  <script src="assets/pages.js"></script>
</body>
</html>
